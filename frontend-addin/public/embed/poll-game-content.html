<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prezo Game Content Add-in (PoC)</title>
    <style>
      :root {
        --bg: #06183a;
        --bg-accent: #0f2f68;
        --panel: #0b1f47;
        --panel-border: #2c4f84;
        --text: #d5e7ff;
        --muted: #91a9cb;
        --line: #2a4f86;
        --btn: #2d6bff;
        --btn-hover: #2558d1;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Segoe UI", "Trebuchet MS", sans-serif;
        color: var(--text);
        background: linear-gradient(145deg, var(--bg), var(--bg-accent));
      }

      .app {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }

      .bar {
        padding: 8px 12px;
        border-bottom: 1px solid var(--line);
        background: rgba(4, 12, 32, 0.76);
      }

      .bar-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .title {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .status {
        font-size: 12px;
        color: var(--muted);
      }

      .meta {
        margin: 6px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .setup {
        border-top: 1px solid var(--line);
        margin-top: 8px;
        padding-top: 8px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .field label {
        font-size: 11px;
        color: var(--muted);
      }

      .field input,
      .field select {
        width: 100%;
        border: 1px solid var(--panel-border);
        background: var(--panel);
        color: var(--text);
        border-radius: 8px;
        padding: 7px 8px;
        font-size: 12px;
      }

      .field select:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .poll-picker {
        margin-top: 8px;
        display: none;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: end;
      }

      .poll-picker.visible {
        display: grid;
      }

      .actions {
        display: flex;
        align-items: end;
        gap: 8px;
      }

      .actions button {
        border: 0;
        border-radius: 8px;
        background: var(--btn);
        color: #fff;
        padding: 8px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .actions button:hover {
        background: var(--btn-hover);
      }

      .frame-wrap {
        position: relative;
        flex: 1;
      }

      iframe {
        border: 0;
        width: 100%;
        height: 100%;
        background: #03102b;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 28px;
        background: rgba(2, 8, 22, 0.88);
        color: var(--muted);
      }

      .overlay.visible {
        display: flex;
      }

      .app.present-mode .bar {
        display: none;
      }

      .app.present-mode .frame-wrap {
        position: fixed;
        inset: 0;
        z-index: 100;
      }
    </style>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="bar">
        <div class="bar-top">
          <p class="title">Prezo Game Embed PoC</p>
          <span class="status" id="status">initializing</span>
        </div>
        <p class="meta" id="meta">Waiting for session binding...</p>
        <div class="setup">
          <div class="field">
            <label for="session-id">Session ID</label>
            <input id="session-id" type="text" placeholder="UUID" />
          </div>
          <div class="field">
            <label for="session-code">Join Code</label>
            <input id="session-code" type="text" placeholder="9H6B22" />
          </div>
          <div class="field">
            <label for="api-base">API Base</label>
            <input
              id="api-base"
              type="text"
              value="https://prezo-backend-production.up.railway.app"
            />
          </div>
          <div class="actions">
            <button id="connect-btn" type="button">Connect</button>
          </div>
        </div>
        <div class="poll-picker" id="poll-picker">
          <div class="field">
            <label for="poll-select">Poll</label>
            <select id="poll-select" disabled>
              <option value="">Loading polls…</option>
            </select>
          </div>
          <div class="actions">
            <button id="poll-refresh-btn" type="button" title="Reload the list of polls for this session">Refresh</button>
          </div>
        </div>
      </header>
      <section class="frame-wrap">
        <iframe id="game-frame" title="Prezo game surface" allowfullscreen></iframe>
        <div class="overlay visible" id="overlay">
          <div>
            Enter a Session ID or Join Code, or run the Prezo Host add-in first so this
            add-in can auto-read the session binding from the presentation.
          </div>
        </div>
      </section>
    </div>
    <script>
      ;(() => {
        const PREZO_NAMESPACE = "https://prezo.app/session-binding"
        const PREZO_LIBRARY_SYNC_NAMESPACE = "https://prezo.app/library-sync"
        const PREZO_LIBRARY_SYNC_MESSAGE = "prezo:library-sync"
        const PREZO_LIBRARY_SYNC_REQUEST_MESSAGE = "prezo:request-library-sync"
        const params = new URLSearchParams(window.location.search)
        const initialPollId = params.get("pollId") || ""

        const statusEl = document.getElementById("status")
        const metaEl = document.getElementById("meta")
        const sessionIdInput = document.getElementById("session-id")
        const sessionCodeInput = document.getElementById("session-code")
        const apiBaseInput = document.getElementById("api-base")
        const connectBtn = document.getElementById("connect-btn")
        const frame = document.getElementById("game-frame")
        const overlay = document.getElementById("overlay")
        const pollPickerEl = document.getElementById("poll-picker")
        const pollSelectEl = document.getElementById("poll-select")
        const pollRefreshBtn = document.getElementById("poll-refresh-btn")
        let librarySyncState = null
        let selectedPollId = initialPollId
        let resolvedSessionId = ""

        const setStatus = (value) => {
          statusEl.textContent = value
        }

        const setMeta = (message) => {
          metaEl.textContent = message
        }

        const parseBindingXml = (xml) => {
          try {
            const parser = new DOMParser()
            const doc = parser.parseFromString(xml, "application/xml")
            const readNode = (name) =>
              doc.getElementsByTagNameNS(PREZO_NAMESPACE, name)[0]?.textContent ||
              doc.getElementsByTagName(name)[0]?.textContent ||
              ""
            const sessionId = readNode("sessionId")
            if (!sessionId) {
              return null
            }
            return {
              sessionId,
              code: readNode("code"),
              apiBaseUrl: readNode("apiBaseUrl")
            }
          } catch {
            return null
          }
        }

        const parseLibrarySyncXml = (xml) => {
          try {
            const parser = new DOMParser()
            const doc = parser.parseFromString(xml, "application/xml")
            const readNode = (name) =>
              doc.getElementsByTagNameNS(PREZO_LIBRARY_SYNC_NAMESPACE, name)[0]?.textContent ||
              doc.getElementsByTagName(name)[0]?.textContent ||
              ""
            const token = readNode("token")
            const expiresAt = readNode("expiresAt")
            if (!token || !expiresAt) {
              return null
            }
            return {
              token,
              expiresAt,
              apiBaseUrl: readNode("apiBaseUrl")
            }
          } catch {
            return null
          }
        }

        const getPartsByNamespace = (namespace) =>
          new Promise((resolve, reject) => {
            if (!window.Office?.context?.document?.customXmlParts) {
              resolve([])
              return
            }
            Office.context.document.customXmlParts.getByNamespaceAsync(namespace, (result) => {
              if (result.status === Office.AsyncResultStatus.Succeeded) {
                resolve(result.value || [])
              } else {
                reject(result.error)
              }
            })
          })

        const getXml = (part) =>
          new Promise((resolve, reject) => {
            part.getXmlAsync((result) => {
              if (result.status === Office.AsyncResultStatus.Succeeded) {
                resolve(result.value)
              } else {
                reject(result.error)
              }
            })
          })

        const readBindingFromDocument = async () => {
          try {
            const parts = await getPartsByNamespace(PREZO_NAMESPACE)
            if (!parts || parts.length === 0) {
              return null
            }
            const xml = await getXml(parts[0])
            return parseBindingXml(xml)
          } catch {
            return null
          }
        }

        const readLibrarySyncFromDocument = async () => {
          try {
            const parts = await getPartsByNamespace(PREZO_LIBRARY_SYNC_NAMESPACE)
            if (!parts || parts.length === 0) {
              return null
            }
            const xml = await getXml(parts[0])
            const parsed = parseLibrarySyncXml(xml)
            if (!parsed) {
              return null
            }
            const expiresAtMs = Date.parse(parsed.expiresAt)
            if (!Number.isFinite(expiresAtMs) || expiresAtMs <= Date.now()) {
              return null
            }
            return parsed
          } catch {
            return null
          }
        }

        const postLibrarySyncToFrame = () => {
          if (!librarySyncState?.token || !frame.contentWindow) {
            return
          }
          try {
            frame.contentWindow.postMessage(
              {
                type: PREZO_LIBRARY_SYNC_MESSAGE,
                token: librarySyncState.token,
                expiresAt: librarySyncState.expiresAt,
                apiBaseUrl: librarySyncState.apiBaseUrl || apiBaseInput.value.trim() || ""
              },
              window.location.origin
            )
          } catch {
            // ignore cross-frame sync failures
          }
        }

        const applyConfig = ({ sessionId, code, apiBaseUrl }) => {
          if (sessionId) {
            sessionIdInput.value = sessionId
          }
          if (code) {
            sessionCodeInput.value = code.toUpperCase()
          }
          if (apiBaseUrl) {
            apiBaseInput.value = apiBaseUrl
          }
        }

        const describePollOption = (poll, index) => {
          const question =
            typeof poll?.question === "string" && poll.question.trim()
              ? poll.question.trim()
              : `Poll ${index + 1}`
          const status =
            typeof poll?.status === "string" && poll.status.trim()
              ? ` · ${poll.status}`
              : ""
          return `${question}${status}`
        }

        const setPollPickerMessage = (message) => {
          pollSelectEl.replaceChildren()
          const opt = document.createElement("option")
          opt.value = ""
          opt.textContent = message
          pollSelectEl.appendChild(opt)
          pollSelectEl.disabled = true
        }

        const populatePollPicker = (polls) => {
          if (!Array.isArray(polls) || polls.length === 0) {
            setPollPickerMessage("No polls in this session")
            return
          }
          const sorted = [...polls].sort((a, b) => {
            const left = Date.parse(a?.created_at || "") || 0
            const right = Date.parse(b?.created_at || "") || 0
            return right - left
          })
          pollSelectEl.replaceChildren()
          for (let i = 0; i < sorted.length; i += 1) {
            const poll = sorted[i]
            const opt = document.createElement("option")
            opt.value = poll?.id || ""
            opt.textContent = describePollOption(poll, i)
            pollSelectEl.appendChild(opt)
          }
          const match = sorted.find((poll) => poll?.id === selectedPollId)
          if (match) {
            pollSelectEl.value = selectedPollId
          } else {
            const open = sorted.find((poll) => poll?.status === "open") || sorted[0]
            selectedPollId = open?.id || ""
            if (selectedPollId) {
              pollSelectEl.value = selectedPollId
            }
          }
          pollSelectEl.disabled = false
        }

        const resolveSessionId = async (apiBase, sessionId, code) => {
          if (sessionId) {
            return sessionId
          }
          if (!code) {
            return ""
          }
          try {
            const resp = await window.fetch(
              `${apiBase}/sessions/code/${encodeURIComponent(code)}`
            )
            if (!resp.ok) {
              return ""
            }
            const data = await resp.json().catch(() => null)
            return (data && typeof data.id === "string" && data.id) || ""
          } catch {
            return ""
          }
        }

        const loadPolls = async () => {
          const apiBase = apiBaseInput.value.trim()
          if (!apiBase || !resolvedSessionId) {
            pollPickerEl.classList.remove("visible")
            return
          }
          pollPickerEl.classList.add("visible")
          setPollPickerMessage("Loading polls…")
          try {
            const resp = await window.fetch(
              `${apiBase}/sessions/${encodeURIComponent(resolvedSessionId)}/snapshot`
            )
            if (!resp.ok) {
              setPollPickerMessage(`Failed to load polls (HTTP ${resp.status})`)
              return
            }
            const data = await resp.json().catch(() => null)
            populatePollPicker(data?.polls || [])
          } catch {
            setPollPickerMessage("Failed to load polls")
          }
        }

        const loadGameFrame = () => {
          const sessionId = sessionIdInput.value.trim()
          const code = sessionCodeInput.value.trim().toUpperCase()
          const apiBase = apiBaseInput.value.trim()
          const qs = new URLSearchParams()
          if (sessionId) {
            qs.set("sessionId", sessionId)
          }
          if (!sessionId && code) {
            qs.set("code", code)
          }
          if (apiBase) {
            qs.set("apiBase", apiBase)
          }
          if (selectedPollId) {
            qs.set("pollId", selectedPollId)
          }
          frame.src = `${window.location.origin}/poc/poll-game-poc?${qs.toString()}`
          overlay.classList.remove("visible")
          setStatus("connected")
          const mode = sessionId ? "sessionId" : "code"
          const pollSuffix = selectedPollId ? ` · poll ${selectedPollId.slice(0, 8)}` : ""
          setMeta(`Loaded game surface (${mode} mode)${pollSuffix}.`)
        }

        const connect = async () => {
          librarySyncState = await readLibrarySyncFromDocument()
          const sessionId = sessionIdInput.value.trim()
          const code = sessionCodeInput.value.trim().toUpperCase()
          const apiBase = apiBaseInput.value.trim()

          if (!sessionId && !code) {
            overlay.classList.add("visible")
            setStatus("missing session")
            setMeta("Provide a Session ID or Join Code.")
            return
          }

          resolvedSessionId = await resolveSessionId(apiBase, sessionId, code)
          loadGameFrame()
          void loadPolls()
        }

        const init = async () => {
          setStatus("loading")
          librarySyncState = await readLibrarySyncFromDocument()
          const binding = await readBindingFromDocument()
          if (binding) {
            applyConfig(binding)
            setMeta("Session binding found in presentation. Loading game surface...")
            await connect()
            return
          }

          const querySessionId = (params.get("sessionId") || "").trim()
          const queryCode = (params.get("code") || "").trim().toUpperCase()
          const queryApiBase = (params.get("apiBase") || "").trim()
          if (querySessionId || queryCode) {
            applyConfig({
              sessionId: querySessionId,
              code: queryCode,
              apiBaseUrl: queryApiBase
            })
            await connect()
            return
          }

          setStatus("awaiting input")
          setMeta("No document binding found. Enter session details below.")
        }

        connectBtn.addEventListener("click", () => {
          void connect()
        })
        sessionIdInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            void connect()
          }
        })
        sessionCodeInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            void connect()
          }
        })
        pollSelectEl.addEventListener("change", () => {
          const next = pollSelectEl.value || ""
          if (next === selectedPollId) {
            return
          }
          selectedPollId = next
          loadGameFrame()
        })
        pollRefreshBtn.addEventListener("click", () => {
          void loadPolls()
        })
        frame.addEventListener("load", () => {
          postLibrarySyncToFrame()
        })
        window.addEventListener("message", async (event) => {
          if (event.origin && event.origin !== window.location.origin) {
            return
          }
          if (event.source !== frame.contentWindow) {
            return
          }
          const message = event.data
          if (!message || typeof message !== "object") {
            return
          }
          if (message.type === "prezo:present-mode") {
            const app = document.querySelector(".app")
            if (app) {
              app.classList.toggle("present-mode", Boolean(message.active))
            }
            return
          }
          if (message.type !== PREZO_LIBRARY_SYNC_REQUEST_MESSAGE) {
            return
          }
          librarySyncState = await readLibrarySyncFromDocument()
          if (librarySyncState?.token) {
            postLibrarySyncToFrame()
            setMeta("Shared library sync refreshed from the presentation.")
            return
          }
          setMeta("Open Prezo Host while signed in to sync saved themes and artifacts.")
        })

        if (window.Office?.onReady) {
          Office.onReady(() => {
            init()
          })
        } else {
          init()
        }
      })()
    </script>
  </body>
</html>
