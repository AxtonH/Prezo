<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prezo Game Content Add-in (PoC)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --border: #e2e8f0;
        --border-strong: #cbd5e1;
        --text: #0f172a;
        --muted: #64748b;
        --subtle: #94a3b8;
        --brand-navy: #004080;
        --brand-coral: #ff7f60;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
        --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06);
        --radius-md: 10px;
        --radius-lg: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
      }

      .app {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }

      .bar {
        padding: 12px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }

      .bar-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .brand-mark {
        width: 26px;
        height: 26px;
        flex-shrink: 0;
      }

      .title {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--text);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 500;
        color: var(--muted);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 10px;
        white-space: nowrap;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--subtle);
      }

      .status-pill[data-tone="connected"] .status-dot {
        background: #16a34a;
      }

      .status-pill[data-tone="loading"] .status-dot {
        background: var(--brand-coral);
      }

      .status-pill[data-tone="error"] .status-dot {
        background: #ef4444;
      }

      .meta {
        margin: 4px 0 0;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.4;
      }

      .setup {
        margin-top: 12px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
        gap: 10px;
        align-items: end;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      .field label {
        font-size: 11px;
        font-weight: 500;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .field select {
        width: 100%;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        border-radius: var(--radius-md);
        padding: 8px 10px;
        font-size: 13px;
        font-family: inherit;
        transition: border-color 120ms ease, box-shadow 120ms ease;
        cursor: pointer;
      }

      .field select:hover:not(:disabled) {
        border-color: var(--border-strong);
      }

      .field select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      }

      .field select:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        background: var(--bg);
      }

      .field--poll.hidden {
        display: none;
      }

      .actions {
        display: flex;
        align-items: end;
        gap: 8px;
      }

      .btn {
        border: 0;
        border-radius: var(--radius-md);
        background: var(--primary);
        color: #fff;
        padding: 9px 14px;
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: background 120ms ease, transform 80ms ease;
        box-shadow: var(--shadow-sm);
      }

      .btn:hover {
        background: var(--primary-hover);
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn--ghost {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        box-shadow: none;
      }

      .btn--ghost:hover {
        background: var(--bg);
        border-color: var(--border-strong);
      }

      .frame-wrap {
        position: relative;
        flex: 1;
        background: var(--bg);
      }

      iframe {
        border: 0;
        width: 100%;
        height: 100%;
        background: var(--surface);
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 24px;
        background: var(--bg);
      }

      .overlay.visible {
        display: flex;
      }

      .overlay-card {
        max-width: 420px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 28px 24px;
        box-shadow: var(--shadow-md);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .overlay-mark {
        width: 44px;
        height: 44px;
      }

      .overlay-title {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
      }

      .overlay-body {
        margin: 0;
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }

      .app.present-mode .bar {
        display: none;
      }

      .app.present-mode .frame-wrap {
        position: fixed;
        inset: 0;
        z-index: 100;
      }
    </style>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="bar">
        <div class="bar-top">
          <div class="brand">
            <svg
              class="brand-mark"
              viewBox="0 0 100 100"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <circle cx="50" cy="50" r="46" fill="#004080" />
              <circle
                cx="50"
                cy="50"
                r="46"
                fill="none"
                stroke="#FF7F60"
                stroke-width="4"
                stroke-dasharray="12 6"
              />
              <text
                x="50"
                y="64"
                text-anchor="middle"
                font-family="Inter, system-ui, sans-serif"
                font-size="46"
                font-weight="700"
                fill="#ffffff"
              >P</text>
            </svg>
            <p class="title">Prezo Game Embed</p>
          </div>
          <span class="status-pill" id="status" data-tone="loading">
            <span class="status-dot"></span>
            <span class="status-label">initializing</span>
          </span>
        </div>
        <p class="meta" id="meta">Waiting for session binding...</p>
        <div class="setup">
          <div class="field">
            <label for="session-select">Session</label>
            <select id="session-select" disabled>
              <option value="">Loading sessions…</option>
            </select>
          </div>
          <div class="field field--poll hidden" id="poll-field">
            <label for="poll-select">Poll</label>
            <select id="poll-select" disabled>
              <option value="">Loading polls…</option>
            </select>
          </div>
          <div class="actions">
            <button id="refresh-btn" type="button" class="btn btn--ghost" title="Reload sessions and polls">Refresh</button>
          </div>
        </div>
      </header>
      <section class="frame-wrap">
        <iframe id="game-frame" title="Prezo game surface" allowfullscreen></iframe>
        <div class="overlay visible" id="overlay">
          <div class="overlay-card">
            <svg
              class="overlay-mark"
              viewBox="0 0 100 100"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <circle cx="50" cy="50" r="46" fill="#004080" />
              <circle
                cx="50"
                cy="50"
                r="46"
                fill="none"
                stroke="#FF7F60"
                stroke-width="4"
                stroke-dasharray="12 6"
              />
              <text
                x="50"
                y="64"
                text-anchor="middle"
                font-family="Inter, system-ui, sans-serif"
                font-size="46"
                font-weight="700"
                fill="#ffffff"
              >P</text>
            </svg>
            <p class="overlay-title" id="overlay-title">Connect a Prezo session</p>
            <p class="overlay-body" id="overlay-message">
              Open the Prezo Host add-in while signed in, then pick a session above to embed it on this slide.
            </p>
          </div>
        </div>
      </section>
    </div>
    <script>
      ;(() => {
        const PREZO_NAMESPACE = "https://prezo.app/session-binding"
        const PREZO_LIBRARY_SYNC_NAMESPACE = "https://prezo.app/library-sync"
        const PREZO_LIBRARY_SYNC_MESSAGE = "prezo:library-sync"
        const PREZO_LIBRARY_SYNC_REQUEST_MESSAGE = "prezo:request-library-sync"
        const PREZO_LIBRARY_SYNC_STORAGE_KEY = "prezo:library-sync"
        const DEFAULT_API_BASE = "https://prezo-backend-production.up.railway.app"
        const params = new URLSearchParams(window.location.search)
        const initialPollId = params.get("pollId") || ""
        const initialSessionId = (params.get("sessionId") || "").trim()
        const initialApiBase = (params.get("apiBase") || "").trim()

        const statusEl = document.getElementById("status")
        const statusLabelEl = statusEl.querySelector(".status-label")
        const metaEl = document.getElementById("meta")
        const sessionSelectEl = document.getElementById("session-select")
        const pollFieldEl = document.getElementById("poll-field")
        const pollSelectEl = document.getElementById("poll-select")
        const refreshBtn = document.getElementById("refresh-btn")
        const frame = document.getElementById("game-frame")
        const overlay = document.getElementById("overlay")
        const overlayTitleEl = document.getElementById("overlay-title")
        const overlayMessageEl = document.getElementById("overlay-message")

        const STATUS_TONE = {
          initializing: "loading",
          loading: "loading",
          connected: "connected",
          error: "error",
          "no sessions": "error",
          "not signed in": "error"
        }
        let librarySyncState = null
        let apiBase = initialApiBase || DEFAULT_API_BASE
        let selectedSessionId = initialSessionId
        let selectedPollId = initialPollId
        let sessionsList = []

        const setStatus = (value) => {
          if (statusLabelEl) {
            statusLabelEl.textContent = value
          }
          const tone = STATUS_TONE[value] || "loading"
          statusEl.setAttribute("data-tone", tone)
        }

        const setMeta = (message) => {
          metaEl.textContent = message
        }

        const parseBindingXml = (xml) => {
          try {
            const parser = new DOMParser()
            const doc = parser.parseFromString(xml, "application/xml")
            const readNode = (name) =>
              doc.getElementsByTagNameNS(PREZO_NAMESPACE, name)[0]?.textContent ||
              doc.getElementsByTagName(name)[0]?.textContent ||
              ""
            const sessionId = readNode("sessionId")
            if (!sessionId) {
              return null
            }
            return {
              sessionId,
              code: readNode("code"),
              apiBaseUrl: readNode("apiBaseUrl")
            }
          } catch {
            return null
          }
        }

        const parseLibrarySyncXml = (xml) => {
          try {
            const parser = new DOMParser()
            const doc = parser.parseFromString(xml, "application/xml")
            const readNode = (name) =>
              doc.getElementsByTagNameNS(PREZO_LIBRARY_SYNC_NAMESPACE, name)[0]?.textContent ||
              doc.getElementsByTagName(name)[0]?.textContent ||
              ""
            const token = readNode("token")
            const expiresAt = readNode("expiresAt")
            if (!token || !expiresAt) {
              return null
            }
            return {
              token,
              expiresAt,
              apiBaseUrl: readNode("apiBaseUrl")
            }
          } catch {
            return null
          }
        }

        const getPartsByNamespace = (namespace) =>
          new Promise((resolve, reject) => {
            if (!window.Office?.context?.document?.customXmlParts) {
              resolve([])
              return
            }
            Office.context.document.customXmlParts.getByNamespaceAsync(namespace, (result) => {
              if (result.status === Office.AsyncResultStatus.Succeeded) {
                resolve(result.value || [])
              } else {
                reject(result.error)
              }
            })
          })

        const getXml = (part) =>
          new Promise((resolve, reject) => {
            part.getXmlAsync((result) => {
              if (result.status === Office.AsyncResultStatus.Succeeded) {
                resolve(result.value)
              } else {
                reject(result.error)
              }
            })
          })

        const readBindingFromDocument = async () => {
          try {
            const parts = await getPartsByNamespace(PREZO_NAMESPACE)
            if (!parts || parts.length === 0) {
              return null
            }
            const xml = await getXml(parts[0])
            return parseBindingXml(xml)
          } catch {
            return null
          }
        }

        const readLibrarySyncFromLocalStorage = () => {
          try {
            if (typeof window === "undefined" || !window.localStorage) {
              return null
            }
            const raw = window.localStorage.getItem(PREZO_LIBRARY_SYNC_STORAGE_KEY)
            if (!raw) {
              return null
            }
            const parsed = JSON.parse(raw)
            if (!parsed || typeof parsed !== "object") {
              return null
            }
            const token = typeof parsed.token === "string" ? parsed.token : ""
            const expiresAt = typeof parsed.expiresAt === "string" ? parsed.expiresAt : ""
            if (!token || !expiresAt) {
              return null
            }
            const expiresAtMs = Date.parse(expiresAt)
            if (!Number.isFinite(expiresAtMs) || expiresAtMs <= Date.now()) {
              return null
            }
            return {
              token,
              expiresAt,
              apiBaseUrl: typeof parsed.apiBaseUrl === "string" ? parsed.apiBaseUrl : ""
            }
          } catch {
            return null
          }
        }

        const readLibrarySyncFromDocument = async () => {
          const fromStorage = readLibrarySyncFromLocalStorage()
          if (fromStorage) {
            return fromStorage
          }
          try {
            const parts = await getPartsByNamespace(PREZO_LIBRARY_SYNC_NAMESPACE)
            if (!parts || parts.length === 0) {
              return null
            }
            const xml = await getXml(parts[0])
            const parsed = parseLibrarySyncXml(xml)
            if (!parsed) {
              return null
            }
            const expiresAtMs = Date.parse(parsed.expiresAt)
            if (!Number.isFinite(expiresAtMs) || expiresAtMs <= Date.now()) {
              return null
            }
            return parsed
          } catch {
            return null
          }
        }

        const postLibrarySyncToFrame = () => {
          if (!librarySyncState?.token || !frame.contentWindow) {
            return
          }
          try {
            frame.contentWindow.postMessage(
              {
                type: PREZO_LIBRARY_SYNC_MESSAGE,
                token: librarySyncState.token,
                expiresAt: librarySyncState.expiresAt,
                apiBaseUrl: librarySyncState.apiBaseUrl || apiBase || ""
              },
              window.location.origin
            )
          } catch {
            // ignore cross-frame sync failures
          }
        }

        const authHeaders = () =>
          librarySyncState?.token
            ? { Authorization: `Bearer ${librarySyncState.token}` }
            : {}

        const describeSessionOption = (session) => {
          const title =
            typeof session?.title === "string" && session.title.trim()
              ? session.title.trim()
              : `Session ${typeof session?.code === "string" ? session.code : ""}`.trim()
          const code =
            typeof session?.code === "string" && session.code.trim() ? session.code.trim() : ""
          const status =
            typeof session?.status === "string" && session.status.trim()
              ? session.status.trim()
              : ""
          const parts = [title || "Untitled session"]
          if (code) {
            parts.push(code)
          }
          if (status) {
            parts.push(status)
          }
          return parts.join(" · ")
        }

        const describePollOption = (poll, index) => {
          const question =
            typeof poll?.question === "string" && poll.question.trim()
              ? poll.question.trim()
              : `Poll ${index + 1}`
          const status =
            typeof poll?.status === "string" && poll.status.trim()
              ? ` · ${poll.status}`
              : ""
          return `${question}${status}`
        }

        const setSelectMessage = (selectEl, message) => {
          selectEl.replaceChildren()
          const opt = document.createElement("option")
          opt.value = ""
          opt.textContent = message
          selectEl.appendChild(opt)
          selectEl.disabled = true
        }

        const showOverlay = (message, title) => {
          if (title && overlayTitleEl) {
            overlayTitleEl.textContent = title
          }
          if (message) {
            overlayMessageEl.textContent = message
          }
          overlay.classList.add("visible")
          frame.removeAttribute("src")
        }

        const populateSessionPicker = (sessions) => {
          if (!Array.isArray(sessions) || sessions.length === 0) {
            setSelectMessage(sessionSelectEl, "No sessions yet")
            pollFieldEl.classList.add("hidden")
            showOverlay(
              "You don't have any sessions yet. Create one from the Prezo Host add-in, then reopen this embed.",
              "No sessions yet"
            )
            setStatus("no sessions")
            setMeta("Sign in via Prezo Host and create a session to embed it here.")
            return
          }
          sessionsList = sessions
          sessionSelectEl.replaceChildren()
          for (const session of sessions) {
            const opt = document.createElement("option")
            opt.value = session?.id || ""
            opt.textContent = describeSessionOption(session)
            sessionSelectEl.appendChild(opt)
          }
          const match = sessions.find((session) => session?.id === selectedSessionId)
          if (!match) {
            selectedSessionId = sessions[0]?.id || ""
            selectedPollId = initialPollId && match ? initialPollId : ""
          }
          if (selectedSessionId) {
            sessionSelectEl.value = selectedSessionId
          }
          sessionSelectEl.disabled = false
        }

        const populatePollPicker = (polls) => {
          if (!Array.isArray(polls) || polls.length === 0) {
            setSelectMessage(pollSelectEl, "No polls in this session")
            pollFieldEl.classList.remove("hidden")
            return
          }
          const sorted = [...polls].sort((a, b) => {
            const left = Date.parse(a?.created_at || "") || 0
            const right = Date.parse(b?.created_at || "") || 0
            return right - left
          })
          pollSelectEl.replaceChildren()
          for (let i = 0; i < sorted.length; i += 1) {
            const poll = sorted[i]
            const opt = document.createElement("option")
            opt.value = poll?.id || ""
            opt.textContent = describePollOption(poll, i)
            pollSelectEl.appendChild(opt)
          }
          const match = sorted.find((poll) => poll?.id === selectedPollId)
          if (match) {
            pollSelectEl.value = selectedPollId
          } else {
            const open = sorted.find((poll) => poll?.status === "open") || sorted[0]
            selectedPollId = open?.id || ""
            if (selectedPollId) {
              pollSelectEl.value = selectedPollId
            }
          }
          pollSelectEl.disabled = false
          pollFieldEl.classList.remove("hidden")
        }

        const refreshLibrarySyncFromDocument = async () => {
          librarySyncState = await readLibrarySyncFromDocument()
          if (librarySyncState?.apiBaseUrl) {
            apiBase = librarySyncState.apiBaseUrl
          }
          return Boolean(librarySyncState?.token)
        }

        const loadSessions = async () => {
          if (!librarySyncState?.token) {
            await refreshLibrarySyncFromDocument()
          }
          if (!librarySyncState?.token) {
            setSelectMessage(sessionSelectEl, "Sign in via Prezo Host")
            pollFieldEl.classList.add("hidden")
            showOverlay(
              "Open the Prezo Host add-in while signed in, then click Refresh to pick a session.",
              "Sign in to get started"
            )
            setStatus("not signed in")
            setMeta("Waiting for Prezo Host library sync token...")
            return
          }
          setSelectMessage(sessionSelectEl, "Loading sessions…")
          setStatus("loading")
          setMeta("Fetching your sessions from Prezo…")
          try {
            const resp = await window.fetch(
              `${apiBase}/sessions?limit=50`,
              { headers: authHeaders() }
            )
            if (!resp.ok) {
              setSelectMessage(sessionSelectEl, `Failed to load (HTTP ${resp.status})`)
              pollFieldEl.classList.add("hidden")
              showOverlay(
                `Could not load sessions (HTTP ${resp.status}). Try Refresh.`,
                "Couldn't load sessions"
              )
              setStatus("error")
              return
            }
            const data = await resp.json().catch(() => null)
            populateSessionPicker(Array.isArray(data) ? data : [])
            if (selectedSessionId) {
              await loadPolls()
              loadGameFrame()
            }
          } catch {
            setSelectMessage(sessionSelectEl, "Failed to load sessions")
            pollFieldEl.classList.add("hidden")
            showOverlay(
              "Network error while loading sessions. Try Refresh.",
              "Connection problem"
            )
            setStatus("error")
          }
        }

        const loadPolls = async () => {
          if (!selectedSessionId) {
            pollFieldEl.classList.add("hidden")
            return
          }
          pollFieldEl.classList.remove("hidden")
          setSelectMessage(pollSelectEl, "Loading polls…")
          try {
            const resp = await window.fetch(
              `${apiBase}/sessions/${encodeURIComponent(selectedSessionId)}/snapshot`,
              { headers: authHeaders() }
            )
            if (!resp.ok) {
              setSelectMessage(pollSelectEl, `Failed to load (HTTP ${resp.status})`)
              return
            }
            const data = await resp.json().catch(() => null)
            populatePollPicker(data?.polls || [])
          } catch {
            setSelectMessage(pollSelectEl, "Failed to load polls")
          }
        }

        const loadGameFrame = () => {
          if (!selectedSessionId) {
            return
          }
          const qs = new URLSearchParams()
          qs.set("sessionId", selectedSessionId)
          if (apiBase) {
            qs.set("apiBase", apiBase)
          }
          if (selectedPollId) {
            qs.set("pollId", selectedPollId)
          }
          frame.src = `${window.location.origin}/poc/poll-game-poc?${qs.toString()}`
          overlay.classList.remove("visible")
          setStatus("connected")
          const pollSuffix = selectedPollId ? ` · poll ${selectedPollId.slice(0, 8)}` : ""
          const session = sessionsList.find((s) => s?.id === selectedSessionId)
          const sessionLabel = session
            ? describeSessionOption(session)
            : selectedSessionId.slice(0, 8)
          setMeta(`${sessionLabel}${pollSuffix}`)
        }

        const pollForLibrarySyncToken = async (attempts = 10, delayMs = 1500) => {
          for (let i = 0; i < attempts; i += 1) {
            if (librarySyncState?.token) {
              return true
            }
            await new Promise((resolve) => window.setTimeout(resolve, delayMs))
            await refreshLibrarySyncFromDocument()
            if (librarySyncState?.token) {
              await loadSessions()
              return true
            }
          }
          return false
        }

        const init = async () => {
          setStatus("loading")
          await refreshLibrarySyncFromDocument()
          const binding = await readBindingFromDocument()
          if (binding?.apiBaseUrl) {
            apiBase = binding.apiBaseUrl
          }
          if (binding?.sessionId && !selectedSessionId) {
            selectedSessionId = binding.sessionId
          }
          await loadSessions()
          if (!librarySyncState?.token) {
            // Host may write the token moments after this embed loads; keep
            // watching for a short while so the user doesn't have to refresh.
            void pollForLibrarySyncToken()
          }
        }

        sessionSelectEl.addEventListener("change", async () => {
          const next = sessionSelectEl.value || ""
          if (next === selectedSessionId) {
            return
          }
          selectedSessionId = next
          selectedPollId = ""
          await loadPolls()
          loadGameFrame()
        })
        pollSelectEl.addEventListener("change", () => {
          const next = pollSelectEl.value || ""
          if (next === selectedPollId) {
            return
          }
          selectedPollId = next
          loadGameFrame()
        })
        refreshBtn.addEventListener("click", () => {
          void loadSessions()
        })
        window.addEventListener("storage", (event) => {
          if (event.key !== PREZO_LIBRARY_SYNC_STORAGE_KEY) {
            return
          }
          void loadSessions()
        })
        frame.addEventListener("load", () => {
          postLibrarySyncToFrame()
        })
        window.addEventListener("message", async (event) => {
          if (event.origin && event.origin !== window.location.origin) {
            return
          }
          if (event.source !== frame.contentWindow) {
            return
          }
          const message = event.data
          if (!message || typeof message !== "object") {
            return
          }
          if (message.type === "prezo:present-mode") {
            const app = document.querySelector(".app")
            if (app) {
              app.classList.toggle("present-mode", Boolean(message.active))
            }
            return
          }
          if (message.type !== PREZO_LIBRARY_SYNC_REQUEST_MESSAGE) {
            return
          }
          librarySyncState = await readLibrarySyncFromDocument()
          if (librarySyncState?.token) {
            postLibrarySyncToFrame()
            setMeta("Shared library sync refreshed from the presentation.")
            return
          }
          setMeta("Open Prezo Host while signed in to sync saved themes and artifacts.")
        })

        if (window.Office?.onReady) {
          Office.onReady(() => {
            init()
          })
        } else {
          init()
        }
      })()
    </script>
  </body>
</html>
