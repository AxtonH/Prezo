<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prezo Game Content Add-in (PoC)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Start the TLS handshake to the backend in parallel with HTML/CSS/JS
      parsing. Saves ~100-300ms on the first /sessions or /snapshot fetch.
      The href must match the production backend exactly; an extra preconnect
      to a never-used origin is wasted but harmless.
    -->
    <link rel="preconnect" href="https://prezo-backend-production.up.railway.app" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --border: #e2e8f0;
        --border-strong: #cbd5e1;
        --text: #0f172a;
        --muted: #64748b;
        --subtle: #94a3b8;
        --brand-navy: #004080;
        --brand-coral: #ff7f60;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
        --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06);
        --radius-md: 10px;
        --radius-lg: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
      }

      .app {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }

      .bar {
        padding: 12px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }

      .bar-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .brand-mark {
        width: 26px;
        height: 26px;
        flex-shrink: 0;
      }

      .title {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--text);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 500;
        color: var(--muted);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 10px;
        white-space: nowrap;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--subtle);
      }

      .status-pill[data-tone="connected"] .status-dot {
        background: #16a34a;
      }

      .status-pill[data-tone="loading"] .status-dot {
        background: var(--brand-coral);
      }

      .status-pill[data-tone="error"] .status-dot {
        background: #ef4444;
      }

      .setup {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
        gap: 10px;
        align-items: end;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
        width: 220px;
      }

      .field--poll {
        width: 260px;
      }

      .field label {
        font-size: 11px;
        font-weight: 500;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .field select {
        width: 100%;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        border-radius: var(--radius-md);
        padding: 8px 10px;
        font-size: 13px;
        font-family: inherit;
        transition: border-color 120ms ease, box-shadow 120ms ease;
        cursor: pointer;
      }

      .field select:hover:not(:disabled) {
        border-color: var(--border-strong);
      }

      .field select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      }

      .field select:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        background: var(--bg);
      }

      .field--poll.hidden {
        display: none;
      }

      .actions {
        display: flex;
        align-items: end;
        gap: 8px;
        margin-left: auto;
      }

      .btn {
        border: 0;
        border-radius: var(--radius-md);
        background: var(--primary);
        color: #fff;
        padding: 9px 14px;
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: background 120ms ease, transform 80ms ease;
        box-shadow: var(--shadow-sm);
      }

      .btn:hover {
        background: var(--primary-hover);
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn--ghost {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        box-shadow: none;
      }

      .btn--ghost:hover {
        background: var(--bg);
        border-color: var(--border-strong);
      }

      .frame-wrap {
        position: relative;
        flex: 1;
        background: var(--bg);
      }

      iframe {
        border: 0;
        width: 100%;
        height: 100%;
        background: var(--surface);
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 24px;
        background: var(--bg);
      }

      .overlay.visible {
        display: flex;
      }

      .overlay-card {
        max-width: 420px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 28px 24px;
        box-shadow: var(--shadow-md);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .overlay-mark {
        width: 44px;
        height: 44px;
      }

      .overlay-title {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
      }

      .overlay-body {
        margin: 0;
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }

      .app.present-mode .bar {
        display: none;
      }

      .app.present-mode .frame-wrap {
        position: fixed;
        inset: 0;
        z-index: 100;
      }
    </style>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="./embed-identity.js"></script>
    <script src="./embed-state-client.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="bar">
        <div class="bar-top">
          <div class="brand">
            <svg
              class="brand-mark"
              viewBox="0 0 100 100"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <circle cx="50" cy="50" r="46" fill="#004080" />
              <circle
                cx="50"
                cy="50"
                r="46"
                fill="none"
                stroke="#FF7F60"
                stroke-width="4"
                stroke-dasharray="12 6"
              />
              <text
                x="50"
                y="64"
                text-anchor="middle"
                font-family="Inter, system-ui, sans-serif"
                font-size="46"
                font-weight="700"
                fill="#ffffff"
              >P</text>
            </svg>
            <p class="title">Prezo Game Embed</p>
          </div>
          <span class="status-pill" id="status" data-tone="loading">
            <span class="status-dot"></span>
            <span class="status-label">initializing</span>
          </span>
        </div>
        <div class="setup">
          <div class="field">
            <label for="session-select">Session</label>
            <select id="session-select" disabled>
              <option value="">Loading sessions…</option>
            </select>
          </div>
          <div class="field field--poll hidden" id="poll-field">
            <label for="poll-select">Poll</label>
            <select id="poll-select" disabled>
              <option value="">Loading polls…</option>
            </select>
          </div>
          <div class="actions">
            <button id="refresh-btn" type="button" class="btn btn--ghost" title="Reload sessions and polls">Refresh</button>
          </div>
        </div>
      </header>
      <section class="frame-wrap">
        <iframe id="game-frame" title="Prezo game surface" allowfullscreen></iframe>
        <div class="overlay visible" id="overlay">
          <div class="overlay-card">
            <svg
              class="overlay-mark"
              viewBox="0 0 100 100"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <circle cx="50" cy="50" r="46" fill="#004080" />
              <circle
                cx="50"
                cy="50"
                r="46"
                fill="none"
                stroke="#FF7F60"
                stroke-width="4"
                stroke-dasharray="12 6"
              />
              <text
                x="50"
                y="64"
                text-anchor="middle"
                font-family="Inter, system-ui, sans-serif"
                font-size="46"
                font-weight="700"
                fill="#ffffff"
              >P</text>
            </svg>
            <p class="overlay-title" id="overlay-title">Connect a Prezo session</p>
            <p class="overlay-body" id="overlay-message">
              Open the Prezo Host add-in while signed in, then pick a session above to embed it on this slide.
            </p>
          </div>
        </div>
      </section>
    </div>
    <script>
      ;(() => {
        const PREZO_NAMESPACE = "https://prezo.app/session-binding"
        const PREZO_LIBRARY_SYNC_NAMESPACE = "https://prezo.app/library-sync"
        const PREZO_LIBRARY_SYNC_MESSAGE = "prezo:library-sync"
        const PREZO_LIBRARY_SYNC_REQUEST_MESSAGE = "prezo:request-library-sync"
        const PREZO_LIBRARY_SYNC_STORAGE_KEY = "prezo:library-sync"
        const DEFAULT_API_BASE = "https://prezo-backend-production.up.railway.app"
        const params = new URLSearchParams(window.location.search)
        const initialPollId = params.get("pollId") || ""
        const initialSessionId = (params.get("sessionId") || "").trim()
        const initialApiBase = (params.get("apiBase") || "").trim()

        const statusEl = document.getElementById("status")
        const statusLabelEl = statusEl.querySelector(".status-label")
        const sessionSelectEl = document.getElementById("session-select")
        const pollFieldEl = document.getElementById("poll-field")
        const pollSelectEl = document.getElementById("poll-select")
        const refreshBtn = document.getElementById("refresh-btn")
        const frame = document.getElementById("game-frame")
        const overlay = document.getElementById("overlay")
        const overlayTitleEl = document.getElementById("overlay-title")
        const overlayMessageEl = document.getElementById("overlay-message")

        const STATUS_TONE = {
          initializing: "loading",
          loading: "loading",
          connected: "connected",
          error: "error",
          "no sessions": "error",
          "not signed in": "error"
        }
        let librarySyncState = null
        let apiBase = initialApiBase || DEFAULT_API_BASE
        let selectedSessionId = initialSessionId
        let selectedPollId = initialPollId
        let sessionsList = []
        let embedIdentity = null
        let storedEmbedInstance = null
        let persistEmbedInFlight = Promise.resolve()
        let currentScreenMode = ""
        let currentArtifactName = ""
        let currentPresentMode = false
        // Latches true after the first iframe URL is built that includes
        // presentMode=1. Once latched, subsequent loadGameFrame calls in
        // this outer-embed lifetime will NOT re-add the param — that's what
        // was creating the exit-loop on iframe reloads. The user can still
        // re-enter present mode manually via the toggle within the session;
        // we just won't auto-re-trigger it from the URL.
        let presentModeAutoRestoreApplied = false

        const getEmbedStateOptions = () => ({
          apiBase: apiBase || DEFAULT_API_BASE,
          token: librarySyncState?.token || "",
        })

        const canPersistEmbedState = () =>
          Boolean(
            embedIdentity?.id &&
              embedIdentity?.persisted &&
              librarySyncState?.token &&
              window.PrezoEmbedStateClient
          )

        const ensureEmbedInstanceOnServer = async () => {
          if (!canPersistEmbedState()) {
            return null
          }
          try {
            const row = await window.PrezoEmbedStateClient.ensure(
              getEmbedStateOptions(),
              embedIdentity.id,
              {
                session_id: selectedSessionId || null,
                poll_id: selectedPollId || null,
                artifact_kind: "poll-game",
              }
            )
            storedEmbedInstance = row
            return row
          } catch (error) {
            console.warn("embed-instance ensure failed:", error)
            return null
          }
        }

        const queueEmbedStatePatch = (patch) => {
          if (!canPersistEmbedState()) {
            return
          }
          const options = getEmbedStateOptions()
          const id = embedIdentity.id
          persistEmbedInFlight = persistEmbedInFlight
            .catch(() => undefined)
            .then(() =>
              window.PrezoEmbedStateClient.update(options, id, patch).catch(
                (error) => {
                  console.warn("embed-instance update failed:", error)
                }
              )
            )
        }

        const applyStoredEmbedInstance = (row) => {
          if (!row || typeof row !== "object") {
            return
          }
          if (
            typeof row.session_id === "string" &&
            row.session_id &&
            !initialSessionId
          ) {
            selectedSessionId = row.session_id
          }
          if (
            typeof row.poll_id === "string" &&
            row.poll_id &&
            !initialPollId
          ) {
            selectedPollId = row.poll_id
          }
          // Prefer the typed column, fall back to metadata for older rows.
          if (typeof row.screen_mode === "string" && row.screen_mode) {
            currentScreenMode = row.screen_mode
          } else if (
            row.metadata &&
            typeof row.metadata === "object" &&
            typeof row.metadata.screenMode === "string" &&
            row.metadata.screenMode
          ) {
            currentScreenMode = row.metadata.screenMode
          }
          if (typeof row.artifact_name === "string" && row.artifact_name) {
            currentArtifactName = row.artifact_name
          }
          if (typeof row.present_mode === "boolean") {
            currentPresentMode = row.present_mode
          }
        }

        const DUPLICATE_DETECTION_DELAY_MS = 1500
        let duplicateDetectionStarted = false
        let embedLoadToken = ""

        const generateLoadToken = () => {
          if (
            window.PrezoEmbedIdentity &&
            typeof window.PrezoEmbedIdentity.generateUuid === "function"
          ) {
            return window.PrezoEmbedIdentity.generateUuid()
          }
          return `lt-${Date.now().toString(36)}-${Math.random()
            .toString(36)
            .slice(2, 10)}`
        }

        const writeOwnLoadTokenToRow = async () => {
          if (!canPersistEmbedState()) {
            return false
          }
          embedLoadToken = generateLoadToken()
          const nextMetadata = Object.assign(
            {},
            storedEmbedInstance?.metadata && typeof storedEmbedInstance.metadata === "object"
              ? storedEmbedInstance.metadata
              : {},
            { loadToken: embedLoadToken, loadTokenAt: new Date().toISOString() }
          )
          try {
            const updated = await window.PrezoEmbedStateClient.update(
              getEmbedStateOptions(),
              embedIdentity.id,
              { metadata: nextMetadata }
            )
            storedEmbedInstance = updated
            return true
          } catch (error) {
            console.warn("embed duplicate-detect write failed:", error)
            return false
          }
        }

        const readRowForDuplicateCheck = async () => {
          if (!canPersistEmbedState()) {
            return null
          }
          try {
            return await window.PrezoEmbedStateClient.fetch(
              getEmbedStateOptions(),
              embedIdentity.id
            )
          } catch (error) {
            console.warn("embed duplicate-detect read failed:", error)
            return null
          }
        }

        const forkEmbedIdentity = async (siblingRow) => {
          if (!window.PrezoEmbedIdentity) {
            return false
          }
          const previousEmbedId = embedIdentity.id
          const newId = window.PrezoEmbedIdentity.generateUuid()
          const replaceResult = await window.PrezoEmbedIdentity.replace(newId)
          if (!replaceResult || !replaceResult.id) {
            console.warn("embed fork: failed to write new id to settings")
            return false
          }
          embedIdentity = replaceResult
          if (!replaceResult.persisted) {
            console.warn(
              "embed fork minted new id but Office saveAsync failed; the fork will not persist unless the .pptx is saved."
            )
          }
          try {
            const nextRow = await window.PrezoEmbedStateClient.create(
              getEmbedStateOptions(),
              {
                id: newId,
                session_id: selectedSessionId || null,
                poll_id: selectedPollId || null,
                artifact_kind: "poll-game",
                screen_mode: currentScreenMode || null,
                metadata: {
                  forkedFrom: previousEmbedId,
                  forkedAt: new Date().toISOString(),
                  loadToken: embedLoadToken,
                },
              }
            )
            storedEmbedInstance = nextRow
            return true
          } catch (error) {
            console.warn("embed fork: creating new row failed:", error)
            return false
          }
        }

        const scheduleDuplicateDetection = () => {
          if (duplicateDetectionStarted || !canPersistEmbedState()) {
            return
          }
          duplicateDetectionStarted = true
          ;(async () => {
            const wroteToken = await writeOwnLoadTokenToRow()
            if (!wroteToken) {
              duplicateDetectionStarted = false
              return
            }
            await new Promise((resolve) =>
              window.setTimeout(resolve, DUPLICATE_DETECTION_DELAY_MS)
            )
            const latest = await readRowForDuplicateCheck()
            if (!latest || !latest.metadata || typeof latest.metadata !== "object") {
              return
            }
            const latestToken =
              typeof latest.metadata.loadToken === "string"
                ? latest.metadata.loadToken
                : ""
            if (latestToken === embedLoadToken) {
              // Our token survived — we are alone (or the last writer) on
              // this uuid. Nothing to fork.
              storedEmbedInstance = latest
              return
            }
            // Another instance with the same uuid overwrote our token.
            // Deterministic fork: the instance whose token sorts greater
            // forks; the smaller one keeps the original uuid. Ties are
            // astronomically unlikely with random uuids.
            if (embedLoadToken <= latestToken) {
              storedEmbedInstance = latest
              return
            }
            console.info(
              "embed duplicate detected on uuid",
              embedIdentity.id,
              "— forking"
            )
            await forkEmbedIdentity(latest)
          })().catch((error) => {
            console.warn("embed duplicate-detect flow error:", error)
          })
        }

        const setStatus = (value) => {
          if (statusLabelEl) {
            statusLabelEl.textContent = value
          }
          const tone = STATUS_TONE[value] || "loading"
          statusEl.setAttribute("data-tone", tone)
        }

        const parseBindingXml = (xml) => {
          try {
            const parser = new DOMParser()
            const doc = parser.parseFromString(xml, "application/xml")
            const readNode = (name) =>
              doc.getElementsByTagNameNS(PREZO_NAMESPACE, name)[0]?.textContent ||
              doc.getElementsByTagName(name)[0]?.textContent ||
              ""
            const sessionId = readNode("sessionId")
            if (!sessionId) {
              return null
            }
            return {
              sessionId,
              code: readNode("code"),
              apiBaseUrl: readNode("apiBaseUrl")
            }
          } catch {
            return null
          }
        }

        const parseLibrarySyncXml = (xml) => {
          try {
            const parser = new DOMParser()
            const doc = parser.parseFromString(xml, "application/xml")
            const readNode = (name) =>
              doc.getElementsByTagNameNS(PREZO_LIBRARY_SYNC_NAMESPACE, name)[0]?.textContent ||
              doc.getElementsByTagName(name)[0]?.textContent ||
              ""
            const token = readNode("token")
            const expiresAt = readNode("expiresAt")
            if (!token || !expiresAt) {
              return null
            }
            return {
              token,
              expiresAt,
              apiBaseUrl: readNode("apiBaseUrl")
            }
          } catch {
            return null
          }
        }

        const getPartsByNamespace = (namespace) =>
          new Promise((resolve, reject) => {
            if (!window.Office?.context?.document?.customXmlParts) {
              resolve([])
              return
            }
            Office.context.document.customXmlParts.getByNamespaceAsync(namespace, (result) => {
              if (result.status === Office.AsyncResultStatus.Succeeded) {
                resolve(result.value || [])
              } else {
                reject(result.error)
              }
            })
          })

        const getXml = (part) =>
          new Promise((resolve, reject) => {
            part.getXmlAsync((result) => {
              if (result.status === Office.AsyncResultStatus.Succeeded) {
                resolve(result.value)
              } else {
                reject(result.error)
              }
            })
          })

        const readBindingFromDocument = async () => {
          try {
            const parts = await getPartsByNamespace(PREZO_NAMESPACE)
            if (!parts || parts.length === 0) {
              return null
            }
            const xml = await getXml(parts[0])
            return parseBindingXml(xml)
          } catch {
            return null
          }
        }

        const readLibrarySyncFromLocalStorage = () => {
          try {
            if (typeof window === "undefined" || !window.localStorage) {
              return null
            }
            const raw = window.localStorage.getItem(PREZO_LIBRARY_SYNC_STORAGE_KEY)
            if (!raw) {
              return null
            }
            const parsed = JSON.parse(raw)
            if (!parsed || typeof parsed !== "object") {
              return null
            }
            const token = typeof parsed.token === "string" ? parsed.token : ""
            const expiresAt = typeof parsed.expiresAt === "string" ? parsed.expiresAt : ""
            if (!token || !expiresAt) {
              return null
            }
            const expiresAtMs = Date.parse(expiresAt)
            if (!Number.isFinite(expiresAtMs) || expiresAtMs <= Date.now()) {
              return null
            }
            return {
              token,
              expiresAt,
              apiBaseUrl: typeof parsed.apiBaseUrl === "string" ? parsed.apiBaseUrl : ""
            }
          } catch {
            return null
          }
        }

        const readLibrarySyncFromDocument = async () => {
          const fromStorage = readLibrarySyncFromLocalStorage()
          if (fromStorage) {
            return fromStorage
          }
          try {
            const parts = await getPartsByNamespace(PREZO_LIBRARY_SYNC_NAMESPACE)
            if (!parts || parts.length === 0) {
              return null
            }
            const xml = await getXml(parts[0])
            const parsed = parseLibrarySyncXml(xml)
            if (!parsed) {
              return null
            }
            const expiresAtMs = Date.parse(parsed.expiresAt)
            if (!Number.isFinite(expiresAtMs) || expiresAtMs <= Date.now()) {
              return null
            }
            return parsed
          } catch {
            return null
          }
        }

        const postLibrarySyncToFrame = () => {
          if (!librarySyncState?.token || !frame.contentWindow) {
            return
          }
          try {
            frame.contentWindow.postMessage(
              {
                type: PREZO_LIBRARY_SYNC_MESSAGE,
                token: librarySyncState.token,
                expiresAt: librarySyncState.expiresAt,
                apiBaseUrl: librarySyncState.apiBaseUrl || apiBase || ""
              },
              window.location.origin
            )
          } catch {
            // ignore cross-frame sync failures
          }
        }

        const authHeaders = () =>
          librarySyncState?.token
            ? { Authorization: `Bearer ${librarySyncState.token}` }
            : {}

        const describeSessionOption = (session) => {
          const title =
            typeof session?.title === "string" && session.title.trim()
              ? session.title.trim()
              : ""
          if (title) {
            return title
          }
          const code =
            typeof session?.code === "string" && session.code.trim() ? session.code.trim() : ""
          return code ? `Session ${code}` : "Untitled session"
        }

        const describePollOption = (poll, index) => {
          const question =
            typeof poll?.question === "string" && poll.question.trim()
              ? poll.question.trim()
              : `Poll ${index + 1}`
          const status =
            typeof poll?.status === "string" && poll.status.trim()
              ? ` · ${poll.status}`
              : ""
          return `${question}${status}`
        }

        const setSelectMessage = (selectEl, message) => {
          selectEl.replaceChildren()
          const opt = document.createElement("option")
          opt.value = ""
          opt.textContent = message
          selectEl.appendChild(opt)
          selectEl.disabled = true
        }

        const showOverlay = (message, title) => {
          if (title && overlayTitleEl) {
            overlayTitleEl.textContent = title
          }
          if (message) {
            overlayMessageEl.textContent = message
          }
          overlay.classList.add("visible")
          frame.removeAttribute("src")
        }

        const populateSessionPicker = (sessions) => {
          if (!Array.isArray(sessions) || sessions.length === 0) {
            setSelectMessage(sessionSelectEl, "No sessions yet")
            pollFieldEl.classList.add("hidden")
            showOverlay(
              "You don't have any sessions yet. Create one from the Prezo Host add-in, then reopen this embed.",
              "No sessions yet"
            )
            setStatus("no sessions")
            return
          }
          sessionsList = sessions
          sessionSelectEl.replaceChildren()
          for (const session of sessions) {
            const opt = document.createElement("option")
            opt.value = session?.id || ""
            opt.textContent = describeSessionOption(session)
            sessionSelectEl.appendChild(opt)
          }
          const match = sessions.find((session) => session?.id === selectedSessionId)
          if (!match) {
            const previousSessionId = selectedSessionId
            selectedSessionId = sessions[0]?.id || ""
            selectedPollId = initialPollId && match ? initialPollId : ""
            if (selectedSessionId && selectedSessionId !== previousSessionId) {
              queueEmbedStatePatch({
                session_id: selectedSessionId,
                poll_id: selectedPollId || null,
              })
            }
          }
          if (selectedSessionId) {
            sessionSelectEl.value = selectedSessionId
          }
          sessionSelectEl.disabled = false
        }

        const POLL_PLACEHOLDER_LABEL = "— Select a poll —"

        const populatePollPicker = (polls) => {
          if (!Array.isArray(polls) || polls.length === 0) {
            setSelectMessage(pollSelectEl, "No polls in this session")
            pollFieldEl.classList.remove("hidden")
            selectedPollId = ""
            return
          }
          const sorted = [...polls].sort((a, b) => {
            const left = Date.parse(a?.created_at || "") || 0
            const right = Date.parse(b?.created_at || "") || 0
            return right - left
          })
          pollSelectEl.replaceChildren()
          const placeholder = document.createElement("option")
          placeholder.value = ""
          placeholder.textContent = POLL_PLACEHOLDER_LABEL
          pollSelectEl.appendChild(placeholder)
          for (let i = 0; i < sorted.length; i += 1) {
            const poll = sorted[i]
            const opt = document.createElement("option")
            opt.value = poll?.id || ""
            opt.textContent = describePollOption(poll, i)
            pollSelectEl.appendChild(opt)
          }
          const match = sorted.find((poll) => poll?.id === selectedPollId)
          if (match) {
            pollSelectEl.value = selectedPollId
          } else {
            // No stored value, OR the stored value no longer exists in the
            // session. Either way: show the placeholder and require the user
            // to pick explicitly. We do NOT auto-default-and-persist, because
            // doing so silently locks in a value the user never chose, which
            // produces phantom "duplicate poll" rows when a session is shared
            // across multiple slides.
            if (selectedPollId) {
              // Stored poll vanished. Drop our local copy so loadGameFrame
              // shows the "pick a poll" prompt instead of trying to render
              // an iframe pointed at a missing poll. We do NOT patch the row
              // — the stored poll_id stays in DB so the user can recover it
              // by recreating that poll if they want.
              selectedPollId = ""
            }
            pollSelectEl.value = ""
          }
          pollSelectEl.disabled = false
          pollFieldEl.classList.remove("hidden")
        }

        const refreshLibrarySyncFromDocument = async () => {
          librarySyncState = await readLibrarySyncFromDocument()
          if (librarySyncState?.apiBaseUrl) {
            apiBase = librarySyncState.apiBaseUrl
          }
          return Boolean(librarySyncState?.token)
        }

        const loadSessions = async () => {
          if (!librarySyncState?.token) {
            await refreshLibrarySyncFromDocument()
          }
          if (!librarySyncState?.token) {
            setSelectMessage(sessionSelectEl, "Sign in via Prezo Host")
            pollFieldEl.classList.add("hidden")
            showOverlay(
              "Open the Prezo Host add-in while signed in, then click Refresh to pick a session.",
              "Sign in to get started"
            )
            setStatus("not signed in")
            return
          }
          setSelectMessage(sessionSelectEl, "Loading sessions…")
          setStatus("loading")
          try {
            const resp = await window.fetch(
              `${apiBase}/sessions?limit=50&status=active`,
              { headers: authHeaders() }
            )
            if (!resp.ok) {
              setSelectMessage(sessionSelectEl, `Failed to load (HTTP ${resp.status})`)
              pollFieldEl.classList.add("hidden")
              showOverlay(
                `Could not load sessions (HTTP ${resp.status}). Try Refresh.`,
                "Couldn't load sessions"
              )
              setStatus("error")
              return
            }
            const data = await resp.json().catch(() => null)
            populateSessionPicker(Array.isArray(data) ? data : [])
            if (selectedSessionId) {
              await loadPolls()
              loadGameFrame()
            }
          } catch {
            setSelectMessage(sessionSelectEl, "Failed to load sessions")
            pollFieldEl.classList.add("hidden")
            showOverlay(
              "Network error while loading sessions. Try Refresh.",
              "Connection problem"
            )
            setStatus("error")
          }
        }

        const loadPolls = async () => {
          if (!selectedSessionId) {
            pollFieldEl.classList.add("hidden")
            return
          }
          pollFieldEl.classList.remove("hidden")
          setSelectMessage(pollSelectEl, "Loading polls…")
          try {
            const resp = await window.fetch(
              `${apiBase}/sessions/${encodeURIComponent(selectedSessionId)}/snapshot`,
              { headers: authHeaders() }
            )
            if (!resp.ok) {
              setSelectMessage(pollSelectEl, `Failed to load (HTTP ${resp.status})`)
              return
            }
            const data = await resp.json().catch(() => null)
            populatePollPicker(data?.polls || [])
          } catch {
            setSelectMessage(pollSelectEl, "Failed to load polls")
          }
        }

        const loadGameFrame = () => {
          if (!selectedSessionId) {
            return
          }
          if (!selectedPollId) {
            // Don't render the inner iframe with a missing poll. Show the
            // overlay so the user knows they have to pick one before the
            // artifact appears. This is the silent-default fix: we never
            // assume a poll for them.
            showOverlay(
              "Pick a poll above to load this slide's artifact.",
              "Select a poll"
            )
            setStatus("loading")
            return
          }
          const qs = new URLSearchParams()
          qs.set("sessionId", selectedSessionId)
          if (apiBase) {
            qs.set("apiBase", apiBase)
          }
          qs.set("pollId", selectedPollId)
          if (currentScreenMode) {
            qs.set("visualMode", currentScreenMode)
          }
          if (currentArtifactName) {
            qs.set("artifactName", currentArtifactName)
          }
          // Auto-restore present mode ONCE per outer-embed lifetime so the
          // first iframe load on file open enters present mode, but any
          // later iframe reload (picker change, late library-sync token)
          // doesn't re-trigger it after the user exited. The user can
          // re-enter manually via the toggle within the session.
          if (currentPresentMode && !presentModeAutoRestoreApplied) {
            qs.set("presentMode", "1")
            presentModeAutoRestoreApplied = true
          }
          frame.src = `${window.location.origin}/poc/poll-game-poc?${qs.toString()}`
          overlay.classList.remove("visible")
          setStatus("connected")
        }

        const pollForLibrarySyncToken = async (attempts = 10, delayMs = 1500) => {
          for (let i = 0; i < attempts; i += 1) {
            if (librarySyncState?.token) {
              return true
            }
            await new Promise((resolve) => window.setTimeout(resolve, delayMs))
            await refreshLibrarySyncFromDocument()
            if (librarySyncState?.token) {
              await hydrateFromStoredEmbedInstance()
              await loadSessions()
              return true
            }
          }
          return false
        }

        const resolveEmbedIdentityOnce = async () => {
          if (embedIdentity?.id || !window.PrezoEmbedIdentity) {
            return
          }
          try {
            embedIdentity = await window.PrezoEmbedIdentity.resolve()
          } catch (error) {
            console.warn("embed-identity resolve failed:", error)
            embedIdentity = null
          }
        }

        const hydrateFromStoredEmbedInstance = async () => {
          if (!canPersistEmbedState()) {
            return
          }
          const row = await ensureEmbedInstanceOnServer()
          applyStoredEmbedInstance(row)
          scheduleDuplicateDetection()
        }

        const init = async () => {
          setStatus("loading")
          await refreshLibrarySyncFromDocument()
          await resolveEmbedIdentityOnce()
          const binding = await readBindingFromDocument()
          if (binding?.apiBaseUrl) {
            apiBase = binding.apiBaseUrl
          }
          if (binding?.sessionId && !selectedSessionId) {
            selectedSessionId = binding.sessionId
          }
          await hydrateFromStoredEmbedInstance()
          await loadSessions()
          if (!librarySyncState?.token) {
            // Host may write the token moments after this embed loads; keep
            // watching for a short while so the user doesn't have to refresh.
            void pollForLibrarySyncToken()
          }
        }

        sessionSelectEl.addEventListener("change", async () => {
          const next = sessionSelectEl.value || ""
          if (next === selectedSessionId) {
            return
          }
          selectedSessionId = next
          selectedPollId = ""
          queueEmbedStatePatch({
            session_id: selectedSessionId || null,
            poll_id: null,
          })
          await loadPolls()
          loadGameFrame()
        })
        pollSelectEl.addEventListener("change", () => {
          const next = pollSelectEl.value || ""
          if (next === selectedPollId) {
            return
          }
          selectedPollId = next
          queueEmbedStatePatch({ poll_id: selectedPollId || null })
          loadGameFrame()
        })
        refreshBtn.addEventListener("click", () => {
          void loadSessions()
        })
        window.addEventListener("storage", (event) => {
          if (event.key !== PREZO_LIBRARY_SYNC_STORAGE_KEY) {
            return
          }
          void loadSessions()
        })
        frame.addEventListener("load", () => {
          postLibrarySyncToFrame()
        })
        window.addEventListener("message", async (event) => {
          if (event.origin && event.origin !== window.location.origin) {
            return
          }
          if (event.source !== frame.contentWindow) {
            return
          }
          const message = event.data
          if (!message || typeof message !== "object") {
            return
          }
          if (message.type === "prezo:present-mode") {
            const isActive = Boolean(message.active)
            const app = document.querySelector(".app")
            if (app) {
              app.classList.toggle("present-mode", isActive)
            }
            if (isActive === currentPresentMode) {
              return
            }
            currentPresentMode = isActive
            queueEmbedStatePatch({ present_mode: isActive })
            return
          }
          if (message.type === "prezo:active-artifact") {
            const nextName =
              typeof message.artifactName === "string"
                ? message.artifactName
                : ""
            if (nextName === currentArtifactName) {
              return
            }
            currentArtifactName = nextName
            // Send empty string when clearing so the backend nulls the column.
            // (See store.update — empty string maps to None.)
            queueEmbedStatePatch({ artifact_name: nextName || "" })
            return
          }
          if (message.type === "prezo:visual-mode") {
            const nextMode =
              typeof message.visualMode === "string" ? message.visualMode : ""
            if (!nextMode || nextMode === currentScreenMode) {
              return
            }
            currentScreenMode = nextMode
            // Patch only the typed screen_mode column. We deliberately do
            // NOT touch metadata here — the duplicate-detection logic owns
            // metadata.loadToken, and any merge race between the two writers
            // can erase the load token and trick that logic into forking.
            queueEmbedStatePatch({ screen_mode: nextMode })
            return
          }
          if (message.type !== PREZO_LIBRARY_SYNC_REQUEST_MESSAGE) {
            return
          }
          librarySyncState = await readLibrarySyncFromDocument()
          if (librarySyncState?.token) {
            postLibrarySyncToFrame()
          }
        })

        if (window.Office?.onReady) {
          Office.onReady(() => {
            init()
          })
        } else {
          init()
        }
      })()
    </script>
  </body>
</html>
